<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Crypto Scanner MVP</title>
    <style>
        body { background: #0a0f1e; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #161b33; padding: 40px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,255,255,0.2); text-align: center; width: 400px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: none; background: #0a0f1e; color: #38bdf8; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #38bdf8; color: #000; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; border-radius: 8px; display: none; word-break: break-all; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Shield Scanner 🛡️</h2>
        <p>Проверка токена в сети BSC</p>
        <input type="text" id="wallet" placeholder="0x... адрес контракта">
        <button onclick="scan()">СКАНЕРОВАТЬ</button>
        <div id="result"></div>
    </div>

    <script>
        async function scan() {
            const addr = document.getElementById('wallet').value;
            const res = document.getElementById('result');
            res.style.display = 'block';
            res.style.background = '#334155';
            res.innerHTML = '⚡ Подключение к блокчейну...';

            try {
                // Используем бесплатный ключ для теста
                const response = await fetch(`https://api.bscscan.com/api?module=token&action=tokeninfo&contractaddress=${addr}&apikey=6P3Y6H88X46U5R6X6B6E7T8V4R2W8Z1Q7M`);
                const data = await response.json();

                if (data.status === "1") {
                    res.style.background = "#059669";
                    res.innerHTML = `✅ НАЙДЕН<br>Монета: ${data.result[0].tokenName}<br>Символ: ${data.result[0].symbol}`;
                } else {
                    res.style.background = "#b91c1c";
                    res.innerHTML = `❌ ОШИБКА: Контракт не найден или это фейк.`;
                }
            } catch (e) {
                res.innerHTML = 'Ошибка связи.';
            }
        }
    </script>
</body>
</html>
